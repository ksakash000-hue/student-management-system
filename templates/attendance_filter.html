<h2>Attendance Filter</h2>

<form method="GET">
    <input type="date" name="date" required>

    <select name="status">
        <option value="">All</option>
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
    </select>

    <button type="submit">Filter</button>
</form>

<table border="1">
<tr>
    <th>Name</th>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r.name }}</td>
    <td>{{ r.date }}</td>
    <td>{{ r.status }}</td>
</tr>
{% endfor %}
</table>
