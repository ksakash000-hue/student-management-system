<!DOCTYPE html>
<html>
<head>
    <title>Student Grades</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>Student Grade Report</h2>

    <table>
        <tr>
            <th>Student</th>
            <th>Average Marks</th>
            <th>Grade</th>
        </tr>

        {% for r in records %}
        <tr>
            <td>{{ r.name }}</td>
            <td>{{ "%.2f"|format(r.avg_marks) }}</td>
            <td>{{ r.grade }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">⬅ Back</a>
</div>
</body>
</html>
